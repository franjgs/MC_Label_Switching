logging:
  level: INFO
  format: "%(asctime)-15s %(levelname)-8s %(message)s"
  datefmt: "%Y-%m-%d %H:%M:%S"

simulation:
  verbose: true
  f_sel: balanced_accuracy_score
  ecoc_enc: OVA
  flg_swp: true
  maj_min: false
  min_maj: false
  n_simus: 5
  test_size: 25
  N_MAX: 8000
  num_folds: 1
  model_selection: avg
  

paths:
  data_folder: datasets
  output_folder: results_smoke

models:
  # ------------------------------------------------------------------
  # Smoke test - LSEnsemble / AMLP / structured configuration
  #
  # Purpose:
  #   Minimal execution test for the new shared LSEnsemble configuration
  #   resolver. This file intentionally uses the structured shared LSEnsemble-style
  #   syntax, but without any project-specific concepts.
  #
  # Expected size:
  #   One model, one global LSE configuration, three experts, one simulation.
  # ------------------------------------------------------------------
  - name: LSEnsemble
    enabled: true
    class: libraries.labelswitching.LSEnsemble

    params:
      # Base learner used as expert inside the Label Switching Ensemble.
      base_learner: AMLP

      # Base-learner-specific configuration.
      # This follows the structured shared LSEnsemble-style layout.
      base_learner_configs:
        AMLP:
          hidden_size: 4
          activation_fn: tanh
          output_act: 1
          drop_out: 0.0

          optim: lbfgs
          loss_fn: MSE
          n_epoch: 1
          n_batch: auto
          mode: random

          early_stopping: false
          lbfgs_max_iter: 150
          lbfgs_max_eval: 150

    # ------------------------------------------------------------------
    # Label Switching Ensemble optimization flags
    # ------------------------------------------------------------------
    # SW   : optimize / use switching mechanism.
    # QC   : optimize cost ratio QC if enabled.
    # RI_C : optimize classification rebalancing factor if enabled.
    # RI_P : optimize population / neutral rebalancing factor if enabled.
    LSE_optimization:
      SW: true
      QC: false
      RI_C: false
      RI_P: false

    dynamic_params:
      # Asymmetric switching parameters.
      #
      # alpha: majority → minority switching factor.
      # beta : minority → majority switching factor.
      alpha: [0, 0.1, 0.2, 0.3, 0.4] # ['auto', 5]
      beta: [0.0]
      
      # Cost and rebalancing factors.
      #
      # Q_C    : Bayes decision cost ratio QC = (C10 - C00) / (C01 - C11).
      # Q_RB_S : neutral / population rebalancing factor.
      # Q_RB_C : classification-oriented rebalancing factor.
      Q_C: [1]
      Q_RB_S: [1] # ['auto', 5] # ['full'] # [1, 2, 4, 8]
      Q_RB_C: [1] # ['auto', 5] # ['full'] # [1, 2, 4, 8]

      # Ensemble structure.
      num_experts: [11]
